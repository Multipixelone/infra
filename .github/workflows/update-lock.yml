name: Update flake inputs
on:
  workflow_dispatch: # allow manual triggering
  schedule:
    - cron: "0 0 1-31/3 * *" # runs every third day
jobs:
  update-flake-lock:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Install Nix
        uses: DeterminateSystems/nix-installer-action@v22
        with:
          extra-conf: |
            accept-flake-config = true
            auto-optimise-store = true
            access-tokens = github.com=${{ secrets.GITHUB_TOKEN }}
      - name: Install SSH Key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SSH_PRIVATE_KEY }}
      - name: Update flake.lock
        run: nix flake update
      # Mirror `just update`: keep the pinned Firefox addons in lockstep with the
      # flake bump so the automated PR doesn't drift from a manual update.
      - name: Update Firefox addons
        run: |
          nix run 'git+https://git.sr.ht/~rycee/mozilla-addons-to-nix' \
            --option allow-import-from-derivation true \
            -- pkgs/firefox-addons/addons.json pkgs/firefox-addons/generated.nix
      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GH_TOKEN_FOR_UPDATES }}
          branch: update_flake_lock_action
          title: "chore: update flake.lock"
          commit-message: "⚙️ bump flake.lock"
          assignees: Multipixelone
          labels: automated
          add-paths: |
            flake.lock
            pkgs/firefox-addons/generated.nix

{
  "jobs": {
    "update-nixpkgs-age-badge": {
      "runs-on": "ubuntu-latest",
      "steps": [
        {
          "uses": "actions/checkout@v4",
          "with": {
            "fetch-depth": 0,
            "ref": "main"
          }
        },
        {
          "env": {
            "GH_API_TOKEN": "${{ github.token }}"
          },
          "name": "Generate nixpkgs age badge JSON",
          "run": "set -euo pipefail\n\nnixpkgs_node=\"$(jq -r '.nodes.root.inputs.nixpkgs // empty' flake.lock)\"\n\nif [ -z \"$nixpkgs_node\" ]; then\n  echo \"Could not find root nixpkgs input in flake.lock\"\n  exit 1\nfi\n\nrev=\"$(jq -r --arg node \"$nixpkgs_node\" '.nodes[$node].locked.rev // empty' flake.lock)\"\n\nif [ -z \"$rev\" ]; then\n  echo \"Could not find nixpkgs revision for root input ($nixpkgs_node) in flake.lock\"\n  exit 1\nfi\n\ncommit_date=\"$(curl -fsSL \\\n  -H \"Authorization: Bearer $GH_API_TOKEN\" \\\n  -H \"Accept: application/vnd.github+json\" \\\n  \"https://api.github.com/repos/NixOS/nixpkgs/commits/$rev\" \\\n  | jq -r '.commit.committer.date // empty')\"\n\nif [ -z \"$commit_date\" ]; then\n  echo \"Could not resolve nixpkgs commit date for revision: $rev\"\n  exit 1\nfi\n\ncommit_ts=\"$(date -u -d \"$commit_date\" +%s)\"\nnow_ts=\"$(date -u +%s)\"\nage_days=\"$(( (now_ts - commit_ts) / 86400 ))\"\n\ncolor=\"brightgreen\"\nif [ \"$age_days\" -gt 7 ]; then color=\"green\"; fi\nif [ \"$age_days\" -gt 14 ]; then color=\"yellowgreen\"; fi\nif [ \"$age_days\" -gt 30 ]; then color=\"yellow\"; fi\nif [ \"$age_days\" -gt 60 ]; then color=\"orange\"; fi\nif [ \"$age_days\" -gt 90 ]; then color=\"red\"; fi\n\nbadge_json=\"$RUNNER_TEMP/nixpkgs-age.json\"\njq -n \\\n  --arg message \"${age_days}d\" \\\n  --arg color \"$color\" \\\n  '{schemaVersion: 1, label: \"nixpkgs age\", message: $message, color: $color}' \\\n  > \"$badge_json\"\n"
        },
        {
          "env": {
            "GH_TOKEN": "${{ secrets.BADGE_GIST_TOKEN }}",
            "GIST_ID": "${{ vars.BADGE_GIST_ID }}"
          },
          "name": "Publish badge JSON to gist",
          "run": "set -euo pipefail\ngh gist edit \"$GIST_ID\" -a nixpkgs-age.json < \"$RUNNER_TEMP/nixpkgs-age.json\"\n"
        }
      ]
    }
  },
  "name": "Nixpkgs age badge",
  "on": {
    "push": {
      "paths": [
        "flake.lock",
        ".github/workflows/nixpkgs-age-badge.yaml"
      ]
    },
    "schedule": [
      {
        "cron": "0 */12 * * *"
      }
    ],
    "workflow_dispatch": {}
  },
  "permissions": {
    "contents": "read"
  }
}
